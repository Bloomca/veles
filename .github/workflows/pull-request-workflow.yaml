name: test-workflow
run-name: Veles test checks
on:
  push:
        branches:
            - main
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript compile check
        run: npm run ts-compile-check
      - name: Run tests
        run: npm run test
